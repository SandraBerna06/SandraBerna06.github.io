<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sandra Berná — Software & AI Engineer</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* ==========================================================
       1. DISEÑO BASE: APPLE LIGHT MODE
    ========================================================== */
    :root {
      --bg-color: #f5f5f7;
      --surface: #ffffff;
      --text-main: #1d1d1f;
      --text-muted: #86868b;
      --accent: #0071e3;
      --font-main: 'Inter', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      background-color: var(--bg-color); 
      color: var(--text-main); 
      font-family: var(--font-main); 
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Contenedor del 3D fijado al fondo */
    #webgl-container {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 0;
      pointer-events: none;
    }

    main {
      position: relative;
      z-index: 1;
    }

    /* ==========================================================
       2. COMPONENTES Y CRISTAL (GLASSMORPHISM)
    ========================================================== */
    .section {
      position: relative;
      width: 100%;
      min-height: 100vh;
      padding: 10vh 10vw;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 24px;
      padding: 3rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.05);
    }

    /* ==========================================================
       3. TIPOGRAFÍA Y ESTRUCTURA
    ========================================================== */
    .title-xl {
      font-size: clamp(3rem, 8vw, 8rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 1rem;
    }

    .title-lg {
      font-size: clamp(2rem, 4vw, 4rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 2rem;
    }

    .subtitle {
      font-size: clamp(1.2rem, 2vw, 1.8rem);
      font-weight: 400;
      color: var(--text-muted);
      max-width: 600px;
    }

    /* Alineaciones para cruzar con el 3D */
    .align-left { align-items: flex-start; text-align: left; }
    .align-right { align-items: flex-end; text-align: right; }
    .align-center { align-items: center; text-align: center; }

    /* Tarjetas de Experiencia y Educación */
    .grid-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
      width: 100%;
      max-width: 600px;
    }

    .item-card {
      margin-bottom: 1.5rem;
    }
    
    .item-card:last-child {
      margin-bottom: 0;
    }

    .item-year
